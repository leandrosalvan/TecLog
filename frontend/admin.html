<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <title>TecLog+ · Backoffice</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="topbar">
    <div class="logo">TecLog<span>+</span> · Backoffice</div>

  </div>

  <div class="container">
    <div class="hello">
      <h2 id="ola">Painel de controle</h2>
      <p>Resumo e gestão dos seus clientes.</p>
    </div>

    <div class="menu-grid" id="menu">
      <div class="menu-card" data-href="/admin/clientes">
        <div class="ic">👥</div>
        <div class="ti">Clientes</div>
        <div class="de">Criar e gerenciar acessos</div>
      </div>
      <div class="menu-card" data-href="/admin/financas">
        <div class="ic">💰</div>
        <div class="ti">Finanças</div>
        <div class="de">Resumo dos clientes</div>
      </div>
      <div class="menu-card" data-href="/admin/conta">
        <div class="ic">👤</div>
        <div class="ti">Minha conta</div>
        <div class="de">Trocar minha senha</div>
      </div>
    </div>
  </div>

  <script src="/js/admin.js"></script>

</html>
