<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <title>TecLog+ · Minha conta</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="topbar">
    <div class="logo">TecLog<span>+</span></div>
    <div class="topbar-acts">
      <a href="/admin" class="link-home" aria-label="Backoffice" title="Backoffice">
        <svg viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9"/></svg>
      </a>
      <button id="btn-sair">Sair</button>
    </div>
  </div>

  <div class="container">
    <h2 class="page-title">Minha conta</h2>
    <p class="page-sub">Dados de acesso do seu Backoffice.</p>

    <div class="section">
      <h3>Trocar minha senha</h3>
      <p class="hint">Troque a senha do seu Backoffice quando quiser.</p>
      <form id="form-senha" class="form-inline">
        <label for="s-atual">Senha atual</label>
        <input type="password" id="s-atual" autocomplete="current-password" required />
        <label for="s-nova">Nova senha</label>
        <input type="password" id="s-nova" autocomplete="new-password" placeholder="mínimo 4 caracteres" required />
        <div id="msg-senha" class="msg"></div>
        <button type="submit" class="btn btn-sm">Trocar senha</button>
      </form>
    </div>
  </div>

  <script src="/js/admin_conta.js"></script>
</body>
</html>
