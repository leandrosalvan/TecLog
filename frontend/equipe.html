<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <title>TecLog+ · Equipe</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="topbar">
    <div class="logo">TecLog<span>+</span></div>
    <div class="topbar-acts">
      <a href="/ordens" class="link-home" aria-label="Início" title="Início">
        <svg viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9"/></svg>
      </a>
      <button id="btn-menu" class="btn-menu" aria-label="Abrir menu">
        <span class="bar"></span><span class="bar"></span><span class="bar"></span>
        <span class="menu-dot" id="menu-dot"></span>
      </button>
    </div>
  </div>

  <!-- Menu lateral (drawer) -->
  <div class="drawer-overlay" id="drawer-overlay"></div>
  <nav class="drawer" id="drawer" aria-label="Menu principal">
    <div class="drawer-head">
      <div class="drawer-user">
        <div class="drawer-nome" id="drawer-nome">Olá!</div>
        <div class="drawer-email" id="drawer-email"></div>
        <span class="badge" id="drawer-papel"></span>
      </div>
      <button class="drawer-x" id="drawer-fechar" aria-label="Fechar menu">✕</button>
    </div>
    <div class="drawer-itens" id="drawer-itens"></div>
    <button class="drawer-sair" id="btn-sair">Sair</button>
  </nav>

  <div class="container">
    <h2 class="page-title">Expandir equipe</h2>
    <p class="page-sub">Cadastre seus técnicos e atribua o perfil de pagamento de cada um. (Os perfis você cria na aba <em>Valores</em>.)</p>

    <!-- Técnicos -->
    <div class="section">
      <h3>Técnicos da equipe</h3>
      <p class="hint">Técnicos que vão registrar O.S. no sistema. Cada um recebe um login próprio.</p>
      <ul class="list" id="lista-tecnicos"></ul>
      <div id="trava-perfil" class="aviso-trava" style="display:none"></div>
      <div class="form-titulo">Adicionar novo técnico</div>
      <form id="form-tecnico" class="form-inline">
        <label for="tec-nome">Nome</label>
        <input type="text" id="tec-nome" placeholder="Ex.: João Pedro" required />

        <label for="tec-sobrenome">Sobrenome</label>
        <input type="text" id="tec-sobrenome" placeholder="Ex.: Silva" required />

        <label for="tec-email">E-mail (login) — gerado automaticamente</label>
        <input type="text" id="tec-email" class="auto" readonly placeholder="preencha nome e sobrenome" />

        <label for="tec-tel">Telefone / contato</label>
        <input type="tel" id="tec-tel" placeholder="(00) 00000-0000" />

        <label for="tec-senha">Senha inicial</label>
        <input type="text" id="tec-senha" value="123456" required />

        <label for="tec-perfil">Perfil de repasse</label>
        <select id="tec-perfil"></select>

        <div id="msg-tecnico" class="msg"></div>
        <button type="submit" class="btn btn-sm">+ Adicionar técnico</button>
      </form>
    </div>
  </div>

  <script src="/js/aviso.js"></script>
  <script src="/js/menu.js"></script>
  <script src="/js/equipe.js"></script>
</body>
</html>
