<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <title>TecLog+ · Criar conta</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="brand">
      <div class="logo">TecLog<span>+</span></div>
      <div class="tagline">Crie a conta da sua operação</div>
    </div>

    <div class="card">
      <h1>Criar conta</h1>
      <p class="sub">Conta do técnico. Depois você poderá expandir sua equipe.</p>

      <form id="form-cadastro">
        <label for="nome">Nome / Razão social</label>
        <input type="text" id="nome" autocomplete="name" placeholder="Seu nome ou empresa" required />

        <label for="email">E-mail</label>
        <input type="email" id="email" autocomplete="email" placeholder="voce@exemplo.com" required />

        <label for="senha">Senha</label>
        <input type="password" id="senha" autocomplete="new-password" placeholder="mínimo 4 caracteres" required />

        <div id="msg" class="msg"></div>
        <button type="submit" class="btn" id="btn-criar">Criar conta</button>
      </form>

      <p class="alt">Já tem conta? <a href="/">Entrar</a></p>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
