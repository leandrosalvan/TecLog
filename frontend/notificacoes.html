<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <title>TecLog+ · Notificações</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="topbar">
    <div class="logo">TecLog<span>+</span></div>
    <div class="topbar-acts">
      <a href="/home" class="link-home" aria-label="Início" title="Início">
        <svg viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9"/></svg>
      </a>
      <button id="btn-menu" class="btn-menu" aria-label="Abrir menu">
        <span class="bar"></span><span class="bar"></span><span class="bar"></span>
        <span class="menu-dot" id="menu-dot"></span>
      </button>
    </div>
  </div>

  <!-- Menu lateral (drawer) -->
  <div class="drawer-overlay" id="drawer-overlay"></div>
  <nav class="drawer" id="drawer" aria-label="Menu principal">
    <div class="drawer-head">
      <div class="drawer-user">
        <div class="drawer-nome" id="drawer-nome">Olá!</div>
        <div class="drawer-email" id="drawer-email"></div>
        <span class="badge" id="drawer-papel"></span>
      </div>
      <button class="drawer-x" id="drawer-fechar" aria-label="Fechar menu">✕</button>
    </div>
    <div class="drawer-itens" id="drawer-itens"></div>
    <button class="drawer-sair" id="btn-sair">Sair</button>
  </nav>

  <div class="container">
    <h2 class="page-title">Notificações</h2>
    <p class="page-sub">O.S. sinalizadas pela gestão. Abra, veja os detalhes e confirme com o visto.</p>

    <div id="lista-notif"></div>
  </div>

  <script src="/js/aviso.js"></script>
  <script src="/js/menu.js"></script>
  <script src="/js/notificacoes.js"></script>
</body>
</html>
