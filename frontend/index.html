<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <title>TecLog+ · Entrar</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="brand">
      <div class="logo">TecLog<span>+</span></div>
      <div class="tagline">Controle de O.S. para equipes técnicas</div>
    </div>

    <div class="card">
      <h1>Entrar</h1>
      <p class="sub">Acesse sua conta para gerenciar suas ordens de serviço.</p>

      <form id="form-login">
        <label for="email">E-mail</label>
        <input type="email" id="email" autocomplete="email" placeholder="voce@exemplo.com" required />

        <label for="senha">Senha</label>
        <input type="password" id="senha" autocomplete="current-password" placeholder="••••••" required />

        <div id="msg" class="msg"></div>
        <button type="submit" class="btn" id="btn-entrar">Entrar</button>
      </form>

      <p class="alt"><a href="/planos">Conheça nossos planos →</a></p>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
