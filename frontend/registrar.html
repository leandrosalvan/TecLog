<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <title>TecLog+ · Registrar O.S.</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="topbar">
    <a href="/dashboard" class="link-voltar">← Voltar</a>
    <div class="logo">TecLog<span>+</span></div>
    <button id="btn-sair">Sair</button>
  </div>

  <div class="container">
    <h2 class="page-title">Registrar O.S.</h2>
    <p class="page-sub">Copie do sistema do provedor e cole aqui. O valor é calculado automaticamente pelo seu perfil.</p>

    <!-- Formulário -->
    <div class="section">
      <form id="form-os" class="form-inline">
        <label for="os-cliente">Nome / razão social do cliente</label>
        <input type="text" id="os-cliente" placeholder="Cole o nome do cliente" required />

        <label for="os-classe">Classe de serviço</label>
        <select id="os-classe" required></select>

        <label for="os-data">Data</label>
        <input type="date" id="os-data" />

        <div id="msg-os" class="msg"></div>
        <button type="submit" class="btn">+ Registrar O.S.</button>
      </form>
    </div>

    <!-- O.S. de hoje -->
    <div class="section">
      <div class="classe-head">
        <h3>O.S. de hoje</h3>
        <span class="tag" id="resumo">0 O.S. · R$ 0,00</span>
      </div>
      <ul class="list" id="lista-os"></ul>
    </div>
  </div>

  <script src="/js/aviso.js"></script>
  <script src="/js/registrar.js"></script>
</body>
</html>
