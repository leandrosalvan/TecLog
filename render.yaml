services:
  - type: web
    name: teclog
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: TZ
        value: America/Sao_Paulo
      - key: DATABASE_URL
        fromDatabase:
          name: teclog-db
          property: connectionString

databases:
  - name: teclog-db
    plan: free
